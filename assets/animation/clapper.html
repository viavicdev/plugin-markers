<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Clapper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    width: 180px;
    height: 200px;
    position: relative;
  }

  /* Bottom plate */
  .body {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    height: 90px;
    border: 1.5px solid #0a0a0a;
    border-radius: 2px;
  }

  /* Top arm (the clapping piece) — positioned lower so rotation has room above */
  .top {
    position: absolute;
    top: 80px;
    left: 0;
    right: 0;
    height: 22px;
    background: #0a0a0a;
    border-radius: 2px;
    transform-origin: 7px 11px;
    animation: clap 2.4s cubic-bezier(0.45, 0, 0.55, 1) infinite;
  }

  /* Hinge dot */
  .hinge {
    position: absolute;
    top: 86px;
    left: 3px;
    width: 8px;
    height: 8px;
    background: #DB1A1A;
    border-radius: 50%;
    z-index: 5;
  }

  @keyframes clap {
    0%, 35%   { transform: rotate(-22deg); }
    55%       { transform: rotate(0deg); }
    62%       { transform: rotate(-2deg); }
    70%, 100% { transform: rotate(0deg); }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="body"></div>
  <div class="top"></div>
  <div class="hinge"></div>
</div>

</body>
</html>
